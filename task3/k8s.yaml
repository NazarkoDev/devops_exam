apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesliuk-app-${ENV_NAME}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tesliuk-app-${ENV_NAME}
  template:
    metadata:
      labels:
        app: tesliuk-app-${ENV_NAME}
    spec:
      containers:
      - name: fastapi-app
        image: ${DOCKER_IMAGE}
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: tesliuk-service-${ENV_NAME}
spec:
  selector:
    app: tesliuk-app-${ENV_NAME}
  ports:
    - protocol: TCP
      port: ${APP_PORT}
      targetPort: 8000
  type: NodePort