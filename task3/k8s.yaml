apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesliuk-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tesliuk-app
  template:
    metadata:
      labels:
        app: tesliuk-app
    spec:
      containers:
      - name: fastapi-app
        image: ${DOCKER_IMAGE}
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: tesliuk-service
spec:
  selector:
    app: tesliuk-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: NodePort